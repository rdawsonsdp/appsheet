<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#570522">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Brown Sugar Bakery — Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arsenal:ital,wght@0,400;0,700;1,400&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Top Navigation -->
  <nav class="top-nav" role="banner">
    <div class="nav-brand">
      <span class="nav-brand-name">Brown Sugar Bakery</span>
      <span class="nav-brand-sub">Orders</span>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false">
      <span class="menu-toggle-icon"></span>
    </button>
  </nav>

  <!-- Menu Drawer -->
  <div class="menu-backdrop" id="menuBackdrop"></div>
  <nav class="menu-drawer" id="menuDrawer" aria-label="Main navigation">
    <div class="menu-drawer-header">
      <span class="menu-drawer-title">Brown Sugar Bakery</span>
      <button class="menu-close-btn" id="menuCloseBtn" aria-label="Close menu">&#10005;</button>
    </div>
    <ul class="menu-list">
      <li><a href="/" class="menu-item">Orders</a></li>
      <li><a href="/management.html" class="menu-item">Management</a></li>
    </ul>
  </nav>

  <!-- View Tabs -->
  <nav class="view-tabs" role="tablist">
    <button class="view-tab view-tab--active" data-view="orders" role="tab" aria-selected="true">Orders</button>
    <button class="view-tab" data-view="delivery" role="tab" aria-selected="false">Delivery Orders</button>
  </nav>

  <!-- Main Content -->
  <main role="main">

    <!-- Quick Actions -->
    <div class="quick-actions" id="quickActions">
      <button class="quick-action-btn" id="todayPickupsBtn" type="button" data-view="orders">
        Today's Pickups
      </button>
      <button class="quick-action-btn" id="upcomingPickupsBtn" type="button" data-view="orders">
        Upcoming Pickups
      </button>
      <button class="quick-action-btn" id="todayDeliveriesBtn" type="button" data-view="delivery" hidden>
        Today's Deliveries
      </button>
      <button class="quick-action-btn" id="upcomingDeliveriesBtn" type="button" data-view="delivery" hidden>
        Upcoming Deliveries
      </button>
    </div>

    <!-- Collapsible Filter Panel -->
    <section class="filter-section" aria-label="Order filters">
      <button
        class="filter-toggle"
        aria-expanded="true"
        aria-controls="filterPanel"
        id="filterToggleBtn"
      >
        <span>
          🔍 Filters
          <span class="filter-badge" id="filterBadge" hidden>0</span>
        </span>
        <span class="arrow" aria-hidden="true">▼</span>
      </button>

      <div class="filter-panel" id="filterPanel" role="region" aria-labelledby="filterToggleBtn">
        <div class="filter-grid">
          <div class="filter-group" id="groupDateFrom">
            <label for="dateFrom">Pickup Date From</label>
            <input type="date" id="dateFrom" aria-label="Filter pickup date from">
          </div>
          <div class="filter-group" id="groupDateTo">
            <label for="dateTo">Pickup Date To</label>
            <input type="date" id="dateTo" aria-label="Filter pickup date to">
          </div>
          <div class="filter-group" id="groupOrderDateFrom">
            <label for="orderDateFrom">Order Date From</label>
            <input type="date" id="orderDateFrom" aria-label="Filter order date from">
          </div>
          <div class="filter-group" id="groupOrderDateTo">
            <label for="orderDateTo">Order Date To</label>
            <input type="date" id="orderDateTo" aria-label="Filter order date to">
          </div>
          <div class="filter-group">
            <label for="statusSelect">Status</label>
            <select id="statusSelect" aria-label="Filter by status">
              <option value="">All Statuses</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="orderTypeSelect">Order Type</label>
            <select id="orderTypeSelect" aria-label="Filter by order type">
              <option value="">All Types</option>
            </select>
          </div>
          <div class="filter-group filter-group--full">
            <label for="customerSearch">Customer</label>
            <input type="search" id="customerSearch" placeholder="Search…" aria-label="Search by customer name">
          </div>
        </div>

        <div class="filter-actions">
          <button class="btn-clear" id="clearFiltersBtn" type="button">Clear</button>
          <button class="btn-search" id="searchBtn" type="button">📋 Get Orders</button>
        </div>
      </div>
    </section>

    <!-- Orders Header -->
    <div class="orders-header" role="toolbar" aria-label="Order list controls">
      <span class="orders-count" id="ordersCount" aria-live="polite"></span>
      <div class="orders-header-right">
        <div class="sort-control">
          <select id="sortField" aria-label="Sort by field">
            <option value="_RowNumber">Entry Order</option>
            <option value="Order Date">Order Date</option>
            <option value="Due Pickup Date">Pickup Date</option>
            <option value="Order Name">Customer</option>
            <option value="Status">Status</option>
            <option value="Order Count">Items</option>
            <option value="Due Pickup Time">Pickup Time</option>
            <option value="Total">Total</option>
          </select>
          <button class="sort-dir-btn" id="sortDirBtn" aria-label="Toggle sort direction" title="Toggle sort direction">↑</button>
        </div>
        <button class="select-all-btn" id="selectAllBtn" type="button">Select All</button>
      </div>
    </div>

    <!-- Order Cards -->
    <div class="orders-list" id="ordersList" role="list" aria-label="Orders">
      <div class="state-msg" id="loadingMsg">
        <div class="spinner" role="status" aria-label="Loading"></div>
        <p>Loading orders…</p>
      </div>
    </div>

  </main>

  <!-- Fixed Bottom Action Bar -->
  <div class="action-bar" role="toolbar" aria-label="Print actions">
    <span class="action-bar-count" id="actionBarCount" aria-live="polite">
      <strong>0</strong> selected
    </span>
    <div class="action-bar-buttons">
      <button
        class="btn-print btn-print-all"
        id="printAllBtn"
        type="button"
        aria-label="Print all orders"
      >
        🖨 Print All
      </button>
      <button
        class="btn-print"
        id="printBtn"
        type="button"
        disabled
        aria-label="Print selected orders"
      >
        🖨 Print Selected
      </button>
    </div>
  </div>

  <!-- Hidden print container (rendered at print time) -->
  <div id="printContainer" aria-hidden="true"></div>

  <!-- Order Detail Modal -->
  <div class="modal-backdrop" id="orderModalBackdrop" hidden role="dialog" aria-modal="true" aria-labelledby="modalOrderName">
    <div class="modal-sheet" id="orderModal">

      <!-- Modal Header -->
      <div class="modal-header">
        <div class="modal-header-left">
          <span class="modal-title" id="modalOrderName"></span>
          <span class="modal-count-badge" id="modalCount"></span>
        </div>
        <button class="modal-close-btn" id="modalCloseBtn" aria-label="Close">✕</button>
      </div>

      <!-- Status + key fields -->
      <div class="modal-meta" id="modalMeta"></div>

      <!-- Line items -->
      <div class="modal-items-wrap" id="modalItemsWrap"></div>

      <!-- Notes -->
      <div class="modal-notes" id="modalNotes" hidden></div>

      <!-- Footer actions -->
      <div class="modal-footer">
        <button class="modal-btn-select" id="modalSelectBtn" type="button">☐ Select for Print</button>
        <button class="modal-btn-print" id="modalPrintBtn" type="button">🖨 Print This Order</button>
      </div>

    </div>
  </div>

  <script src="/menu.js"></script>
  <script src="/app.js"></script>
</body>
</html>
